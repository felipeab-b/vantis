services: 
  backend:
    builds: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

    mongo:
      image: mongo:7
      ports:
        - "27017:27017"
      volumes:
        - mongo_data:/data/db

volumes:
  mongo_data: